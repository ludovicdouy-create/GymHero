<!doctype html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aperçu — Notification fin de repos</title>
<style>
:root{
  --bg:#0E131E; --card:#171E2C; --card2:#212B40; --line:#2A3450;
  --text:#EEF1F7; --muted:#8C96AA;
  --gold:#F5B63F; --teal:#3BD6A0; --coral:#FF6B4A;
  --radius:16px;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg,#0E1116);color:var(--text,#E8ECF3);
  font-family:ui-rounded,-apple-system,system-ui,sans-serif;padding:20px;}
h1{font-size:19px;margin:0 0 4px;}
.hint{color:var(--muted,#8C96AA);font-size:13px;margin:0 0 18px;}
.card{background:var(--card,#171B22);border-radius:16px;padding:16px;margin-bottom:14px;
  border:1px solid var(--line,#252B36);max-width:460px;}
.card h2{font-size:16px;margin:0 0 12px;}

.timerbox{display:flex; align-items:center; gap:10px;}
.timerbox .tdisp{font-family:ui-rounded; font-size:30px; font-weight:800; min-width:86px;
  text-align:center; color:var(--teal);}
.timerbox .tdisp.run{color:var(--gold);}
.tpresets{display:flex; gap:6px; flex:1; flex-wrap:wrap;}
.tpresets button{background:var(--card2); border:1px solid var(--line); color:var(--text);
  border-radius:999px; padding:8px 12px; font-size:13px; font-family:ui-rounded; cursor:pointer;}
.tpresets button:active{border-color:var(--teal);}
.tpresets button.stop{color:var(--coral);}
.notifline{margin-top:12px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  background:var(--card2); border-radius:12px; padding:10px 13px;}
.notifline .nl-txt{flex:1; min-width:140px; font-size:12.5px; color:var(--muted); line-height:1.45;}
.notifline .nl-btn{background:var(--teal); color:#06382A; border:none; border-radius:999px;
  padding:8px 14px; font-size:13px; font-weight:800; font-family:ui-rounded; cursor:pointer;}
.notifline.on .nl-btn{background:var(--card); color:var(--muted); border:1px solid var(--line);}
.notifline.hide{display:none;}

#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
  background:var(--card2,#1E232C);border:1px solid var(--line,#252B36);color:var(--text,#E8ECF3);
  padding:12px 18px;border-radius:999px;font-size:13.5px;opacity:0;pointer-events:none;
  transition:.25s;max-width:90vw;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.log{max-width:460px;font-size:12px;color:var(--muted,#8C96AA);background:var(--card,#171B22);
  border:1px solid var(--line,#252B36);border-radius:12px;padding:12px;min-height:60px;
  font-family:ui-monospace,monospace;line-height:1.7;}
.dbg{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;max-width:460px;}
.dbg button{background:var(--card2,#1E232C);border:1px solid var(--line,#252B36);
  color:var(--text,#E8ECF3);border-radius:999px;padding:7px 12px;font-size:12.5px;cursor:pointer;}
</style></head><body>
<h1>Aperçu — Notification de fin de repos</h1>
<p class="hint">Clique « Activer 🔔 » puis lance un timer. Teste aussi écran verrouillé / app en arrière-plan.</p>
<div class="card">
  <h2>Repos entre séries ⏱️</h2>
  <div class="timerbox">
    <div class="tdisp" id="tdisp">–:––</div>
    <div class="tpresets" id="tpresets">
      <button data-s="60">1:00</button>
      <button data-s="90">1:30</button>
      <button data-s="120">2:00</button>
      <button data-s="180">3:00</button>
      <button class="stop" id="tstop" style="display:none;">Stop</button>
    </div>
  </div>
  <div class="notifline" id="notifline">
    <span class="nl-txt" id="notif-txt">Reçois une alerte quand le repos est fini, même écran éteint.</span>
    <button class="nl-btn" id="notif-btn">Activer 🔔</button>
  </div>
</div>
<div class="dbg">
  <button data-s="5">Test 5 s</button>
  <button data-s="10">Test 10 s</button>
  <button id="clr">Vider le journal</button>
</div>
<div class="log" id="log">Journal…</div>
<div id="toast"></div>
<script>
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2600);
  L('toast: '+msg);}
function L(m){const l=document.getElementById('log');
  l.textContent=new Date().toLocaleTimeString('fr-FR')+' · '+m+'\n'+l.textContent;}
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw-apercu.js').catch(e=>L('SW: '+e.message));
/* ============ TIMER DE REPOS ============ */
let timerEnd=null, timerInt=null, timerFired=false;
const REST_MSG='Tu peux reprendre l\u2019exercice !';
function fmtT(s){ return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }

/* --- Notifications --- */
const notifOK=()=> ('Notification' in window) && Notification.permission==='granted';
function renderNotifUI(){
  const line=document.getElementById('notifline'); if(!line) return;
  const txt=document.getElementById('notif-txt'), btn=document.getElementById('notif-btn');
  if(!('Notification' in window)){ line.classList.add('hide'); return; }
  if(Notification.permission==='granted'){
    line.classList.add('on');
    txt.textContent='Alerte de fin de repos activée 🔔';
    btn.textContent='Tester';
  } else if(Notification.permission==='denied'){
    line.classList.add('on');
    txt.textContent='Notifications bloquées. Autorise-les dans les réglages de ton navigateur.';
    btn.textContent='Réessayer';
  } else {
    line.classList.remove('on');
    txt.textContent='Reçois une alerte quand le repos est fini, même écran éteint.';
    btn.textContent='Activer 🔔';
  }
}
function pushRestNotif(){
  if(!notifOK()) return false;
  try{
    if(navigator.serviceWorker && navigator.serviceWorker.ready){
      navigator.serviceWorker.ready.then(reg=>{
        if(reg && reg.active) reg.active.postMessage({type:'REST_DONE', body:REST_MSG});
        else if(reg) reg.showNotification('Repos terminé ! 💪',{body:REST_MSG,icon:'./icon-192.png',tag:'gymhero-rest'});
      }).catch(()=>{ new Notification('Repos terminé ! 💪',{body:REST_MSG,icon:'./icon-192.png'}); });
      return true;
    }
    new Notification('Repos terminé ! 💪',{body:REST_MSG,icon:'./icon-192.png'});
    return true;
  }catch(_){ return false; }
}
const notifBtn=document.getElementById('notif-btn');
if(notifBtn) notifBtn.addEventListener('click',()=>{
  if(!('Notification' in window)){ toast('Notifications non supportées sur cet appareil'); return; }
  if(Notification.permission==='granted'){ primeBeep(); pushRestNotif(); toast('Notification de test envoyée 🔔'); return; }
  Notification.requestPermission().then(p=>{
    renderNotifUI();
    if(p==='granted'){ primeBeep(); toast('Alerte de repos activée 🔔'); }
    else toast('Permission refusée — tu auras seulement le son et la vibration');
  }).catch(()=>{});
});
renderNotifUI();

/* --- Bip sonore --- */
let audioCtx=null;
function primeBeep(){
  try{
    const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
    if(!audioCtx) audioCtx=new AC();
    if(audioCtx.state==='suspended') audioCtx.resume();
  }catch(_){}
}
function beep(){
  try{
    if(!audioCtx) primeBeep();
    if(!audioCtx) return;
    if(audioCtx.state==='suspended') audioCtx.resume();
    [0,0.28,0.56].forEach((off,i)=>{
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      const t=audioCtx.currentTime+off;
      o.type='sine'; o.frequency.setValueAtTime(i===2?1100:880,t);
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.35,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.22);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t); o.stop(t+0.24);
    });
  }catch(_){}
}

function stopTimer(){
  clearInterval(timerInt); timerInt=null; timerEnd=null; timerFired=false;
  const d=document.getElementById('tdisp');
  if(d){ d.textContent='–:––'; d.classList.remove('run'); }
  const st=document.getElementById('tstop'); if(st) st.style.display='none';
}
function restDone(){
  if(timerFired) return;
  timerFired=true;
  clearInterval(timerInt); timerInt=null; timerEnd=null;
  const d=document.getElementById('tdisp');
  if(d){ d.textContent='0:00'; d.classList.remove('run'); }
  const st=document.getElementById('tstop'); if(st) st.style.display='none';
  if(navigator.vibrate) navigator.vibrate([200,100,200,100,400]);
  beep();
  pushRestNotif();
  toast('⏱️ Repos terminé — '+REST_MSG);
}
function tickTimer(){
  if(timerEnd===null) return;
  const left=Math.max(0, Math.round((timerEnd-Date.now())/1000));
  const d=document.getElementById('tdisp');
  if(d) d.textContent=fmtT(left);
  if(left<=0) restDone();
}
document.getElementById('tpresets').addEventListener('click',e=>{
  const b=e.target.closest('button[data-s]');
  if(b){
    stopTimer();
    primeBeep();
    timerFired=false;
    timerEnd=Date.now()+parseInt(b.dataset.s,10)*1000;
    document.getElementById('tdisp').classList.add('run');
    document.getElementById('tstop').style.display='';
    tickTimer();
    timerInt=setInterval(tickTimer,250);
    return;
  }
  if(e.target.closest('#tstop')) stopTimer();
});
/* Retour au premier plan : rattrape le temps écoulé pendant la mise en veille */
document.addEventListener('visibilitychange',()=>{ if(!document.hidden && timerEnd!==null) tickTimer(); });
window.addEventListener('focus',()=>{ if(timerEnd!==null) tickTimer(); });

document.querySelectorAll('.dbg button[data-s]').forEach(b=>b.addEventListener('click',()=>{
  stopTimer();primeBeep();timerFired=false;
  timerEnd=Date.now()+parseInt(b.dataset.s,10)*1000;
  document.getElementById('tdisp').classList.add('run');
  document.getElementById('tstop').style.display='';
  tickTimer();timerInt=setInterval(tickTimer,250);
  L('timer lancé: '+b.dataset.s+' s');
}));
document.getElementById('clr').addEventListener('click',()=>document.getElementById('log').textContent='Journal…');
L('aperçu prêt — permission: '+(('Notification' in window)?Notification.permission:'non supporté'));
</script></body></html>
